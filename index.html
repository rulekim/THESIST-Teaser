<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THESIST</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Raleway:wght@100;200&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

  html, body {
    width:100%; height:100%;
    background:#ffffff;
    overflow:hidden;
  }

  /* hairlines */
  .line {
    position:fixed; left:0; right:0; height:1px; background:#111; z-index:2;
    transform:scaleX(0);
  }
  .line-top    { top:0;    transform-origin:left;  animation:line-in 1.2s cubic-bezier(.77,0,.18,1) .1s forwards; }
  .line-bottom { bottom:0; transform-origin:right; animation:line-in 1.2s cubic-bezier(.77,0,.18,1) .25s forwards; }
  @keyframes line-in { to { transform:scaleX(1); } }

  /* stage */
  .stage {
    position:relative; z-index:1;
    width:100vw; height:100vh;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
  }

  /* symbol */
  .sym {
    opacity:0;
    transform:translateY(-18px) scale(.96);
    animation:up 1.4s cubic-bezier(.16,1,.3,1) 1s forwards;
  }
  .sym img {
    width:min(140px, 20vw);
    display:block;
  }

  /* wordmark */
  .word {
    margin-top:1.6rem;
    opacity:0;
    transform:translateY(12px);
    animation:up 1.2s cubic-bezier(.16,1,.3,1) 1.8s forwards;
  }
  .word img {
    width:min(360px, 52vw);
    display:block;
  }

  /* tagline */
  .tagline {
    margin-top:3.2rem;
    opacity:0;
    transform:translateY(6px);
    font-family:'Raleway', sans-serif;
    font-weight:100;
    font-size:clamp(15px, 1.35vw, 19px);
    letter-spacing:.42em;
    color:#111111;
    text-transform:uppercase;
    animation:up 1s ease 2.7s forwards;
  }

  @keyframes up {
    from { opacity:0; transform:translateY(10px); }
    to   { opacity:1; transform:translateY(0); }
  }

  /* corners */
  .corner {
    position:fixed; bottom:2.2rem;
    font-family:'Raleway', sans-serif;
    font-weight:200;
    font-size:8.5px;
    letter-spacing:.28em;
    color:#bbb;
    text-transform:uppercase;
    opacity:0;
    animation:up 1s ease 3.2s forwards;
  }
  .corner-l { left:2.4rem; }
  .corner-r { right:2.4rem; }

  /* cursor */
  .cur {
    display:inline-block;
    width:1px; height:.7em;
    background:#111;
    margin-left:5px;
    vertical-align:middle;
    opacity:0;
    animation:blink 1.1s step-end infinite 3.7s;
  }
  @keyframes blink {
    0%,100% { opacity:1; }
    50%      { opacity:0; }
  }
</style>
</head>
